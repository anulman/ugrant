name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
      title:
        description: Release title
        required: false

permissions:
  contents: read

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_os: linux
          - os: macos-latest
            artifact_os: macos
          - os: windows-latest
            artifact_os: windows
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Run tests
        run: zig build test

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Cross-build Windows ARM64
        if: runner.os == 'Windows'
        shell: pwsh
        run: zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-windows

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          case "$(uname -m)" in
            x86_64|amd64) ARCH="x86_64" ;;
            arm64|aarch64)
              if [ "${{ matrix.artifact_os }}" = "linux" ]; then
                ARCH="aarch64"
              else
                ARCH="arm64"
              fi
              ;;
            *)
              echo "Unsupported release architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          TARGET="${{ matrix.artifact_os }}-${ARCH}"
          NAME="ugrant-${{ github.event.inputs.tag }}-${TARGET}"
          PKGDIR="dist/${NAME}"

          mkdir -p "$PKGDIR"
          cp zig-out/bin/ugrant "$PKGDIR/ugrant"
          cp README.md LICENSE SPEC.md "$PKGDIR/"
          tar -C dist -czf "dist/${NAME}.tar.gz" "$NAME"

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${NAME}.tar.gz" > "dist/${NAME}.tar.gz.sha256"
          else
            shasum -a 256 "dist/${NAME}.tar.gz" > "dist/${NAME}.tar.gz.sha256"
          fi

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          New-Item -ItemType Directory -Path dist -Force | Out-Null

          $targets = @(
            @{ zig = 'x86_64-windows'; archive = 'windows-x86_64' },
            @{ zig = 'aarch64-windows'; archive = 'windows-arm64' }
          )

          foreach ($targetInfo in $targets) {
            $zigArgs = @(
              'build'
              '-Doptimize=ReleaseSafe'
              "-Dtarget=$($targetInfo.zig)"
            )
            & zig @zigArgs

            $target = $targetInfo.archive
            $name = "ugrant-${{ github.event.inputs.tag }}-$target"
            $pkgdir = Join-Path 'dist' $name
            $archive = Join-Path 'dist' "$name.zip"

            if (Test-Path $pkgdir) {
              Remove-Item $pkgdir -Recurse -Force
            }

            New-Item -ItemType Directory -Path $pkgdir -Force | Out-Null
            Copy-Item 'zig-out/bin/ugrant.exe' -Destination (Join-Path $pkgdir 'ugrant.exe')
            Copy-Item README.md, LICENSE, SPEC.md -Destination $pkgdir

            if (Test-Path $archive) {
              Remove-Item $archive -Force
            }

            Compress-Archive -Path $pkgdir -DestinationPath $archive

            $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
            Set-Content -Path "$archive.sha256" -Value "$hash  $([System.IO.Path]::GetFileName($archive))" -NoNewline
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.artifact_os }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download packaged artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Install minisign
        shell: bash
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "MINISIGN_SECRET_KEY not set, skipping minisign install."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Sign release archives
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag }}
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "MINISIGN_SECRET_KEY not set, skipping minisign signing."
            exit 0
          fi

          if grep -q '^REPLACE_WITH_MINISIGN_PUBLIC_KEY$' minisign.pub; then
            echo "minisign.pub still contains the placeholder key. Skipping minisign signing for this release." >&2
            exit 0
          fi

          key_file="$RUNNER_TEMP/ugrant.minisign.key"
          derived_pubkey="$RUNNER_TEMP/ugrant.minisign.pub"
          trap 'rm -f "$key_file" "$derived_pubkey"' EXIT
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$key_file"

          minisign -R -s "$key_file" -p "$derived_pubkey"
          expected_key="$(tail -n 1 minisign.pub)"
          derived_key="$(tail -n 1 "$derived_pubkey")"
          if [ "$expected_key" != "$derived_key" ]; then
            echo "Checked-in minisign.pub does not match MINISIGN_SECRET_KEY" >&2
            echo "expected: $expected_key" >&2
            echo "derived:  $derived_key" >&2
            exit 1
          fi

          found_archive=false
          while IFS= read -r -d '' archive; do
            found_archive=true
            minisign -Sm "$archive" -s "$key_file" -x "$archive.minisig" -c "signature for $(basename "$archive")" -t "ugrant release ${TAG}"
            minisign -Vm "$archive" -p minisign.pub -x "$archive.minisig" >/dev/null
          done < <(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 | sort -z)

          if [ "$found_archive" = false ]; then
            echo "No release archives found in dist/" >&2
            exit 1
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}
          TITLE: ${{ github.event.inputs.title }}
        run: |
          set -euo pipefail
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "${TITLE:-$TAG}" --notes "Release $TAG"
          gh release upload "$TAG" dist/* --clobber
