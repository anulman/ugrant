name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-macos
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-windows
            archive_ext: zip

    runs-on: ${{ matrix.os }}
    env:
      APPLE_CODESIGN_P12_BASE64: ${{ secrets.APPLE_CODESIGN_P12_BASE64 }}
      APPLE_CODESIGN_P12_PASSWORD: ${{ secrets.APPLE_CODESIGN_P12_PASSWORD }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
      MINISIGN_SECRET_KEY_B64: ${{ secrets.MINISIGN_SECRET_KEY_B64 }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev minisign

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          swift --version
          if ! command -v minisign >/dev/null; then
            brew install minisign
          fi

      - name: Install Windows deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command minisign -ErrorAction SilentlyContinue)) {
            choco install minisign -y
          }

      - name: Run tests
        run: zig build test

      - name: Build release binary
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Build macOS Secure Enclave helper
        if: runner.os == 'macOS'
        run: bash scripts/build-macos-helper.sh --release --out-dir dist/macos-helper

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.APPLE_CODESIGN_P12_BASE64 != '' && env.APPLE_CODESIGN_P12_PASSWORD != ''
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/ugrant-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/apple-signing.p12"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$APPLE_CODESIGN_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CODESIGN_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign macOS binaries
        if: runner.os == 'macOS' && env.APPLE_CODESIGN_IDENTITY != ''
        run: bash scripts/sign-macos-binaries.sh zig-out/bin/ugrant dist/macos-helper/ugrant-se-helper

      - name: Package release (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          base="dist/ugrant-${tag#v}-${{ matrix.target }}"
          pkgdir="$base"
          mkdir -p "$pkgdir/bin"
          cp zig-out/bin/ugrant "$pkgdir/bin/ugrant"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            cp dist/macos-helper/ugrant-se-helper "$pkgdir/bin/ugrant-se-helper"
          fi
          cp README.md LICENSE SPEC.md "$pkgdir/"
          if [ -f install.sh ]; then
            cp install.sh "$pkgdir/"
          fi
          tar -C dist -czf "$base.tar.gz" "$(basename "$pkgdir")"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            ditto -c -k --keepParent "$pkgdir" "$base.zip"
          fi

      - name: Package release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = '${{ inputs.tag }}'
          $base = "dist/ugrant-$($tag.TrimStart('v'))-${{ matrix.target }}"
          $pkgdir = $base
          New-Item -ItemType Directory -Force -Path "$pkgdir/bin" | Out-Null
          Copy-Item zig-out/bin/ugrant.exe "$pkgdir/bin/ugrant.exe"
          Copy-Item README.md, LICENSE, SPEC.md -Destination $pkgdir
          if (Test-Path install.ps1) {
            Copy-Item install.ps1 $pkgdir
          }
          $archive = "$base.zip"
          if (Test-Path $archive) {
            Remove-Item $archive -Force
          }
          Compress-Archive -Path $pkgdir -DestinationPath $archive

      - name: Notarize macOS zip
        if: runner.os == 'macOS' && env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_PASSWORD != ''
        run: |
          tag="${{ inputs.tag }}"
          bash scripts/notarize-macos-archive.sh "dist/ugrant-${tag#v}-${{ matrix.target }}.zip"

      - name: Verify macOS signatures
        if: runner.os == 'macOS' && env.APPLE_CODESIGN_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_PASSWORD != ''
        run: |
          tag="${{ inputs.tag }}"
          bash scripts/verify-macos-binaries.sh \
            "dist/ugrant-${tag#v}-${{ matrix.target }}/bin/ugrant" \
            "dist/ugrant-${tag#v}-${{ matrix.target }}/bin/ugrant-se-helper"

      - name: Generate checksums and signatures (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for archive in dist/*.tar.gz dist/*.zip; do
            [ -f "$archive" ] || continue
            sha256sum "$archive" | awk '{print $1"  "FILENAME}' FILENAME="$(basename "$archive")" > "$archive.sha256"
            if [[ -n "${MINISIGN_SECRET_KEY:-}" ]]; then
              printf '\n' | minisign -S -s <(printf '%s' "$MINISIGN_SECRET_KEY") -m "$archive" -x "$archive.minisig"
            fi
          done

      - name: Generate checksums and signatures (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem dist -Filter *.zip | ForEach-Object {
            $archive = $_.FullName
            $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
            "$hash  $($_.Name)" | Set-Content -NoNewline "$archive.sha256"
            $keyPath = Join-Path $env:RUNNER_TEMP 'minisign.key'
            if ($env:MINISIGN_SECRET_KEY_B64) {
              [System.IO.File]::WriteAllBytes($keyPath, [System.Convert]::FromBase64String($env:MINISIGN_SECRET_KEY_B64))
              "" | minisign -S -s $keyPath -m $archive -x "$archive.minisig"
            } elseif ($env:MINISIGN_SECRET_KEY) {
              Set-Content -Path $keyPath -Value $env:MINISIGN_SECRET_KEY -NoNewline
              "" | minisign -S -s $keyPath -m $archive -x "$archive.minisig"
            }
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/*.minisig

  publish:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag='${{ inputs.tag }}'
          gh release delete "$tag" --yes || true
          gh release create "$tag" \
            --title "$tag" \
            --notes "Release $tag" \
            dist/release/*
