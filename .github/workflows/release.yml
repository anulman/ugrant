name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
      title:
        description: Release title
        required: false

permissions:
  contents: read

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_os: linux
          - os: macos-latest
            artifact_os: macos
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Run tests
        run: zig test src/main.zig -lc -lsqlite3

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ARCH="$(uname -m)"
          NAME="ugrant-${{ github.event.inputs.tag }}-${{ matrix.artifact_os }}-${ARCH}"
          PKGDIR="dist/${NAME}"
          mkdir -p "$PKGDIR"
          cp zig-out/bin/ugrant "$PKGDIR/ugrant"
          cp README.md LICENSE SPEC.md "$PKGDIR/"
          tar -C dist -czf "dist/${NAME}.tar.gz" "$NAME"
          shasum -a 256 "dist/${NAME}.tar.gz" > "dist/${NAME}.tar.gz.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.artifact_os }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download packaged artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Install minisign
        if: ${{ secrets.MINISIGN_SECRET_KEY != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Sign release archives
        if: ${{ secrets.MINISIGN_SECRET_KEY != '' }}
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag }}
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail

          if grep -q '^REPLACE_WITH_MINISIGN_PUBLIC_KEY$' minisign.pub; then
            echo "minisign.pub still contains the placeholder key. Skipping minisign signing for this release." >&2
            exit 0
          fi

          key_file="$RUNNER_TEMP/ugrant.minisign.key"
          derived_pubkey="$RUNNER_TEMP/ugrant.minisign.pub"
          trap 'rm -f "$key_file" "$derived_pubkey"' EXIT
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$key_file"

          minisign -R -s "$key_file" -p "$derived_pubkey"
          expected_key="$(tail -n 1 minisign.pub)"
          derived_key="$(tail -n 1 "$derived_pubkey")"
          if [ "$expected_key" != "$derived_key" ]; then
            echo "Checked-in minisign.pub does not match MINISIGN_SECRET_KEY" >&2
            echo "expected: $expected_key" >&2
            echo "derived:  $derived_key" >&2
            exit 1
          fi

          found_archive=false
          while IFS= read -r -d '' archive; do
            found_archive=true
            minisign -Sm "$archive" -s "$key_file" -x "$archive.minisig" -c "signature for $(basename "$archive")" -t "ugrant release ${TAG}"
            minisign -Vm "$archive" -p minisign.pub -x "$archive.minisig" >/dev/null
          done < <(find dist -maxdepth 1 -type f -name '*.tar.gz' -print0 | sort -z)

          if [ "$found_archive" = false ]; then
            echo "No release archives found in dist/" >&2
            exit 1
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}
          TITLE: ${{ github.event.inputs.title }}
        run: |
          set -euo pipefail
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "${TITLE:-$TAG}" --notes "Release $TAG"
          gh release upload "$TAG" dist/* --clobber
