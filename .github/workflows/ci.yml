name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
          - os: macos-latest
            target: aarch64-macos
          - os: windows-latest
            target: x86_64-windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16eb3b2b5c8dc0

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Run tests
        run: zig build test

      - name: Build
        run: zig build

      - name: Build macOS Secure Enclave helper
        if: runner.os == 'macOS'
        run: bash scripts/build-macos-helper.sh --release
